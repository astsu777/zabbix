zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 7df96b18c230490a9a0a9e2307226338
      name: Templates
  templates:
    - uuid: db8af726b03148c1b334ea0d47fadede
      template: 'World Ping'
      name: 'World Ping'
      description: 'Send ICMP ping tests towards various servers.'
      readme: |
        ## Setup
        
        Set `Threshold of ICMP packet loss` and `Threshold of the average ICMP response`
      vendor:
        name: astsu777
        version: 1.0.2
      groups:
        - name: Templates
      items:
        - uuid: 86e0ef14210144cc874111f243729224
          name: 'Get data'
          type: CALCULATED
          key: ping.targets.raw
          value_type: TEXT
          params: '"{$ICMP_TARGETS}"'
          description: 'Raw object outputting the targets to ping'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
      discovery_rules:
        - uuid: 0649b3ec789f40c68288b02ef65f895a
          name: 'Discover Ping Targets'
          type: DEPENDENT
          key: ping.discovery
          item_prototypes:
            - uuid: 9d92db9043d84c5393f4776b8dc4a17e
              name: '{#ICMPTARGET} ICMP loss'
              type: SIMPLE
              key: 'icmppingloss[{#ICMPTARGET}]'
              value_type: FLOAT
              units: '%'
              description: 'The percentage of lost packets'
              tags:
                - tag: component
                  value: health
                - tag: component
                  value: network
              trigger_prototypes:
                - uuid: 76440bd79c0d42c18094928ad4678afc
                  expression: '(min(/World Ping/icmppingloss[{#ICMPTARGET}],5m)>{$ICMP_LOSS_WARN} and min(/World Ping/icmppingloss[{#ICMPTARGET}],5m)<100)'
                  name: '{#ICMPTARGET}: High ICMP ping loss'
                  opdata: 'Loss: {ITEM.LASTVALUE1}'
                  status: DISABLED
                  priority: WARNING
                  description: 'ICMP packets loss detected'
                  type: MULTIPLE
                  dependencies:
                    - name: '{#ICMPTARGET}: Unavailable by ICMP ping'
                      expression: 'max(/World Ping/icmpping[{#ICMPTARGET}],3)=0'
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
            - uuid: 184169cc2f194d51ba991b703c780353
              name: '{#ICMPTARGET} ICMP response time'
              type: SIMPLE
              key: 'icmppingsec[{#ICMPTARGET}]'
              value_type: FLOAT
              units: s
              description: 'The ICMP ping response time (in seconds).'
              tags:
                - tag: component
                  value: health
                - tag: component
                  value: network
              trigger_prototypes:
                - uuid: 0c0a5b195a8f4682ab4353110555177a
                  expression: 'avg(/World Ping/icmppingsec[{#ICMPTARGET}],5m)>{$ICMP_RESPONSE_TIME_WARN}'
                  name: '#{ICMPTARGET}: High ICMP ping response time'
                  opdata: 'Value: {ITEM.LASTVALUE1}'
                  status: DISABLED
                  priority: WARNING
                  description: 'Average ICMP response time is too high'
                  type: MULTIPLE
                  dependencies:
                    - name: '{#ICMPTARGET}: High ICMP ping loss'
                      expression: '(min(/World Ping/icmppingloss[{#ICMPTARGET}],5m)>{$ICMP_LOSS_WARN} and min(/World Ping/icmppingloss[{#ICMPTARGET}],5m)<100)'
                    - name: '{#ICMPTARGET}: Unavailable by ICMP ping'
                      expression: 'max(/World Ping/icmpping[{#ICMPTARGET}],3)=0'
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
            - uuid: 1abb3164b09f4f28a0e3897f41db47cf
              name: '{#ICMPTARGET} ICMP ping'
              type: SIMPLE
              key: 'icmpping[{#ICMPTARGET}]'
              description: |
                The host accessibility by ICMP ping.
                
                0 - ICMP ping fails;
                1 - ICMP ping successful.
              valuemap:
                name: 'Service state'
              tags:
                - tag: component
                  value: health
                - tag: component
                  value: network
              trigger_prototypes:
                - uuid: b0a28ab8aa7c47658fc6387b03d8ca93
                  expression: 'max(/World Ping/icmpping[{#ICMPTARGET}],3)=0'
                  name: '{#ICMPTARGET}: Unavailable by ICMP ping'
                  status: DISABLED
                  priority: HIGH
                  description: 'Last three attempts returned timeout. Please check device connectivity'
                  type: MULTIPLE
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
          graph_prototypes:
            - uuid: a419de9c085640e1922985be537ddff8
              name: '{#ICMPTARGET} ICMP response time'
              graph_items:
                - drawtype: BOLD_LINE
                  color: '004586'
                  calc_fnc: MIN
                  item:
                    host: 'World Ping'
                    key: 'icmppingsec[{#ICMPTARGET}]'
          master_item:
            key: ping.targets.raw
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var targets = value.split(',');
                  var data = [];
                  
                  for (var i = 0; i < targets.length; i++) {
                      var t = targets[i].trim();
                      if (t !== "") {
                          data.push({ "{#ICMPTARGET}": t });
                      }
                  }
                  
                  return JSON.stringify({ data: data });
      tags:
        - tag: class
          value: network
        - tag: target
          value: icmp
      macros:
        - macro: '{$ICMP_LOSS_WARN}'
          value: '20'
          description: 'Warning threshold of ICMP packet loss in %'
        - macro: '{$ICMP_RESPONSE_TIME_WARN}'
          value: '0.15'
          description: 'Warning threshold of the average ICMP response time in seconds'
        - macro: '{$ICMP_TARGETS}'
          value: 'cern.ch,jazeerauniversity.edu.so,mit.edu,onet.pl,uae-ed.metercdn.net,uol.com.br,vk.com,www.abc.net.au,www.baidu.com,www.cbc.ca,www.clarin.com,www.google.co.in,www.naspers.com,www.nzherald.co.nz,www.spiegel.de,www.yahoo.co.jp'
          description: 'Comma-separated list of FQDNs/IPs to PING'
      dashboards:
        - uuid: eb9f6d62c9b042dbafe5b30356e0aeb5
          name: 'Internet Latency'
          pages:
            - name: 'Internet Latency'
              widgets:
                - type: graphprototype
                  name: '{#ICMPTARGET} Response Time'
                  width: '72'
                  height: '24'
                  hide_header: 'YES'
                  fields:
                    - type: INTEGER
                      name: columns
                      value: '3'
                    - type: GRAPH_PROTOTYPE
                      name: graphid.0
                      value:
                        host: 'World Ping'
                        name: '{#ICMPTARGET} ICMP response time'
                    - type: STRING
                      name: reference
                      value: PRXCU
                    - type: INTEGER
                      name: rows
                      value: '6'
      valuemaps:
        - uuid: 52d78b330ff24f7f8cd854a5352fcf6a
          name: 'Service state'
          mappings:
            - value: '0'
              newvalue: Down
            - value: '1'
              newvalue: Up
